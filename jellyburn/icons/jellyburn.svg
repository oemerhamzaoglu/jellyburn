<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background rounded square -->
  <rect width="128" height="128" rx="24" fill="#12121a"/>

  <!-- CD outer ring -->
  <circle cx="64" cy="72" r="46" fill="#2a2a3e" stroke="#3a3a58" stroke-width="1.5"/>

  <!-- CD rainbow sheen (subtle) -->
  <circle cx="64" cy="72" r="46" fill="url(#sheen)" opacity="0.18"/>

  <!-- CD grooves -->
  <circle cx="64" cy="72" r="38" fill="none" stroke="#1e1e30" stroke-width="1"/>
  <circle cx="64" cy="72" r="30" fill="none" stroke="#1e1e30" stroke-width="0.8"/>

  <!-- CD inner hub -->
  <circle cx="64" cy="72" r="12" fill="#1a1a2e" stroke="#3a3a58" stroke-width="1"/>
  <circle cx="64" cy="72" r="5"  fill="#0d0d18" stroke="#444466" stroke-width="1"/>

  <!-- Flame – centered above CD hole -->
  <g transform="translate(64, 64)">
    <!-- outer flame (orange) -->
    <path d="M0,-28 C6,-20 14,-14 10,-4 C8,2 4,6 0,8 C-4,6 -8,2 -10,-4 C-14,-14 -6,-20 0,-28Z"
          fill="#e8a838"/>
    <!-- inner flame (red/pink) -->
    <path d="M0,-18 C4,-12 8,-7 6,0 C4,4 2,6 0,7 C-2,6 -4,4 -6,0 C-8,-7 -4,-12 0,-18Z"
          fill="#e94560"/>
    <!-- core (bright) -->
    <path d="M0,-8 C2,-4 3,0 0,4 C-3,0 -2,-4 0,-8Z"
          fill="#ff8fa0" opacity="0.7"/>
  </g>

  <defs>
    <linearGradient id="sheen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ff6eb4"/>
      <stop offset="25%"  stop-color="#e8a838"/>
      <stop offset="50%"  stop-color="#3dc47e"/>
      <stop offset="75%"  stop-color="#5599ff"/>
      <stop offset="100%" stop-color="#cc66ff"/>
    </linearGradient>
  </defs>
</svg>
